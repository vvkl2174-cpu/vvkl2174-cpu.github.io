<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NewgenZ</title>

<style>

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f5f5;
}

/* LOGO */
.logo-container {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 20px;
}

.logo-icon {
  font-size: 60px;
  font-weight: bold;
  color: #ff8c00;
  border: 3px solid #ff8c00;
  border-radius: 8px;
  padding: 5px 10px;
}

.logo-text {
  font-size: 30px;
  font-weight: bold;
  margin: 0;
  color: #111;
}

.logo-sub {
  font-size: 14px;
  color: #666;
  margin: 0;
}

/* IMAGEM */
#i2 {
  width: 90%;
  max-width: 400px;
  display: block;
  margin: 20px auto;
  border-radius: 20px;
}

/* TEXTO */
.caixa {
  border: 2px solid #cfcfcf;
  border-radius: 15px;
  padding: 20px;
  text-align: center;
  font-size: 18px;
  width: 90%;
  max-width: 500px;
  margin: 20px auto;
  background: white;
}

/* LINHAS */
#f1, #f2 {
  height: 2px;
  background: #e0e0e0;
  margin: 20px;
}

#f2 {
  background: #ff8c00;
}

/* BARRA FIXA */
.barra-fixa {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  background: #1F3E47;
  padding: 10px;
  display: flex;
  justify-content: center;
}

/* BOTÃO */
.botao-fixo {
  background: #ff8c00;
  color: white;
  border: none;
  padding: 15px 30px;
  border-radius: 30px;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
}

</style>
</head>

<body>

<!-- LOGO -->
<div class="logo-container">
  <div class="logo-icon">N</div>

  <div>
    <h1 class="logo-text">NEWgen</h1>
    <p class="logo-sub">by evolua</p>
  </div>
</div>

<div id="f1"></div>

<!-- IMAGEM -->
<img id="i2" src="pexels-media-26922999-1776804174159.jpeg">

<!-- TEXTO -->
<div class="caixa">
  <h1>Olá! Você acabou de acessar nosso site premium da Newgen. Saiba mais logo abaixo.</h1>
</div>

<div id="f2"></div>

<!-- BOTÃO FIXO -->
<div class="barra-fixa">
  <a href="sobre.html">
    <button class="botao-fixo">Comece</button>
  </a>
</div>

</body>
</html>
